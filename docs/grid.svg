<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrBlue" markerWidth="9" markerHeight="9" refX="7.5" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3f95d4"/>
    </marker>
    <marker id="arrIndigo" markerWidth="9" markerHeight="9" refX="7.5" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L8,3 L0,6 Z" fill="#6366f1"/>
    </marker>
    <filter id="sh" x="-20%" y="-40%" width="140%" height="180%">
      <feDropShadow dx="0" dy="2" stdDeviation="3.5" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="1200" height="620" fill="#f3f4f6"/>

  <!-- title -->
  <text x="600" y="52" text-anchor="middle" fill="#1f2937" font-size="36" font-weight="700" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">Your Home Grid</text>
  <text x="600" y="84" text-anchor="middle" fill="#6b7280" font-size="14.5">your machines generate  →  your grid distributes  →  your apps draw</text>

  <!-- column labels -->
  <text x="48" y="126" fill="#7c8aa5" font-size="12.5" letter-spacing="1.5" font-weight="700">ENGINES</text>
  <text x="884" y="126" fill="#7c8aa5" font-size="12.5" letter-spacing="1.5" font-weight="700">APPS</text>

  <!-- arrows: engines -> grid -->
  <g fill="none" stroke="#3f95d4" stroke-width="2.5" opacity="0.85">
    <line x1="316" y1="176" x2="497" y2="300" marker-end="url(#arrBlue)"/>
    <line x1="316" y1="262" x2="497" y2="324" marker-end="url(#arrBlue)"/>
    <line x1="316" y1="348" x2="497" y2="348" marker-end="url(#arrBlue)"/>
    <line x1="316" y1="434" x2="497" y2="372" marker-end="url(#arrBlue)"/>
    <line x1="316" y1="520" x2="497" y2="396" marker-end="url(#arrBlue)"/>
  </g>
  <!-- arrows: grid -> apps -->
  <g fill="none" stroke="#6366f1" stroke-width="2.5" opacity="0.85">
    <line x1="700" y1="320" x2="881" y2="218" marker-end="url(#arrIndigo)"/>
    <line x1="700" y1="348" x2="881" y2="348" marker-end="url(#arrIndigo)"/>
    <line x1="700" y1="376" x2="881" y2="478" marker-end="url(#arrIndigo)"/>
  </g>

  <!-- engine nodes (all same color) -->
  <g filter="url(#sh)">
    <rect x="48" y="140" width="268" height="72" rx="16" fill="#3f95d4"/>
    <rect x="48" y="226" width="268" height="72" rx="16" fill="#3f95d4"/>
    <rect x="48" y="312" width="268" height="72" rx="16" fill="#3f95d4"/>
    <rect x="48" y="398" width="268" height="72" rx="16" fill="#3f95d4"/>
    <rect x="48" y="484" width="268" height="72" rx="16" fill="#3f95d4"/>
  </g>
  <g text-anchor="middle">
    <text x="182" y="171" fill="#ffffff" font-size="15.5" font-weight="600">Mac Studio</text>
    <text x="182" y="191" fill="#dbeafe" font-size="12">MLX · text</text>
    <text x="182" y="257" fill="#ffffff" font-size="15.5" font-weight="600">Mac mini</text>
    <text x="182" y="277" fill="#dbeafe" font-size="12">Ollama · text</text>
    <text x="182" y="343" fill="#ffffff" font-size="15.5" font-weight="600">RTX 3090</text>
    <text x="182" y="363" fill="#dbeafe" font-size="12">vLLM · text</text>
    <text x="182" y="429" fill="#ffffff" font-size="15.5" font-weight="600">RTX 4090</text>
    <text x="182" y="449" fill="#dbeafe" font-size="12">llama.cpp · text</text>
    <text x="182" y="515" fill="#ffffff" font-size="15.5" font-weight="600">RTX 5090</text>
    <text x="182" y="535" fill="#dbeafe" font-size="12">ComfyUI · image · video</text>
  </g>

  <!-- the grid hub -->
  <g filter="url(#sh)">
    <rect x="500" y="273" width="200" height="150" rx="24" fill="#10b981"/>
  </g>
  <text x="600" y="305" text-anchor="middle" fill="#bbf7d0" font-size="11" letter-spacing="2.5" font-weight="700">THE GRID</text>
  <text x="600" y="331" text-anchor="middle" fill="#ffffff" font-size="17" font-weight="700">one private endpoint</text>
  <rect x="538" y="344" width="124" height="23" rx="11.5" fill="#052e2a"/>
  <text x="600" y="360" text-anchor="middle" fill="#5eead4" font-size="11.5" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">home:8090/v1</text>
  <text x="600" y="388" text-anchor="middle" fill="#ecfdf5" font-size="12">routes by model</text>
  <text x="600" y="406" text-anchor="middle" fill="#a7f3d0" font-size="11">serves /v1/chat + /v1/media</text>

  <!-- app nodes -->
  <g filter="url(#sh)">
    <rect x="884" y="182" width="268" height="72" rx="16" fill="#6366f1"/>
    <rect x="884" y="312" width="268" height="72" rx="16" fill="#6366f1"/>
    <rect x="884" y="442" width="268" height="72" rx="16" fill="#6366f1"/>
  </g>
  <g text-anchor="middle">
    <text x="1018" y="213" fill="#ffffff" font-size="15.5" font-weight="600">OpenClaw</text>
    <text x="1018" y="233" fill="#e0e7ff" font-size="12">agent runtime</text>
    <text x="1018" y="343" fill="#ffffff" font-size="15.5" font-weight="600">Hermes</text>
    <text x="1018" y="363" fill="#e0e7ff" font-size="12">OpenAI-compatible client</text>
    <text x="1018" y="473" fill="#ffffff" font-size="15.5" font-weight="600">your own app</text>
    <text x="1018" y="493" fill="#e0e7ff" font-size="12">any OpenAI SDK</text>
  </g>
</svg>
