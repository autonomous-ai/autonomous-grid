<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <rect width="1200" height="760" fill="#f3f4f6"/>

  <!-- title -->
  <text x="600" y="64" text-anchor="middle" fill="#1f2937" font-size="40" font-weight="700" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">Your Home Grid</text>
  <text x="600" y="98" text-anchor="middle" fill="#6b7280" font-size="14.5">like an electric grid — your machines generate, your grid distributes, your apps draw</text>

  <!-- ============ APPS ============ -->
  <rect x="48" y="126" width="1104" height="148" rx="24" fill="#6366f1"/>
  <text x="600" y="167" text-anchor="middle" fill="#ffffff" font-size="21" font-weight="700">Apps — anything that speaks the OpenAI API</text>
  <g fill="#ffffff" fill-opacity="0.18">
    <rect x="80" y="192" width="330" height="64" rx="14"/>
    <rect x="434" y="192" width="330" height="64" rx="14"/>
    <rect x="788" y="192" width="330" height="64" rx="14"/>
  </g>
  <g fill="#ffffff" font-size="16" font-weight="600" text-anchor="middle">
    <text x="245" y="230">OpenClaw</text>
    <text x="599" y="230">Hermes</text>
    <text x="953" y="230">your own app</text>
  </g>

  <!-- ============ THE GRID ============ -->
  <rect x="48" y="298" width="1104" height="148" rx="24" fill="#10b981"/>
  <text x="600" y="339" text-anchor="middle" fill="#ffffff" font-size="21" font-weight="700">The Grid — one private endpoint, routes every request by model</text>
  <g fill="#ffffff" fill-opacity="0.18">
    <rect x="80" y="364" width="330" height="64" rx="14"/>
    <rect x="434" y="364" width="330" height="64" rx="14"/>
    <rect x="788" y="364" width="330" height="64" rx="14"/>
  </g>
  <text x="245" y="401" text-anchor="middle" fill="#ffffff" font-size="14" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">http://home:8090/v1</text>
  <g fill="#ffffff" font-size="16" font-weight="600" text-anchor="middle">
    <text x="599" y="402">/v1/chat · text</text>
    <text x="953" y="402">/v1/media · image · video</text>
  </g>

  <!-- ============ ENGINES ============ -->
  <rect x="48" y="470" width="1104" height="242" rx="24" fill="#3f95d4"/>
  <text x="600" y="511" text-anchor="middle" fill="#ffffff" font-size="21" font-weight="700">Engines — the machines you already own</text>
  <g fill="#ffffff" fill-opacity="0.18">
    <rect x="80" y="534" width="330" height="64" rx="14"/>
    <rect x="434" y="534" width="330" height="64" rx="14"/>
    <rect x="788" y="534" width="330" height="64" rx="14"/>
    <rect x="80" y="614" width="330" height="64" rx="14"/>
    <rect x="788" y="614" width="330" height="64" rx="14"/>
  </g>
  <!-- ComfyUI media engine, called out in purple -->
  <rect x="434" y="614" width="330" height="64" rx="14" fill="#7c3aed" fill-opacity="0.55" stroke="#ffffff" stroke-opacity="0.55"/>
  <g fill="#ffffff" font-size="16" font-weight="600" text-anchor="middle">
    <text x="245" y="572">Mac Studio · MLX</text>
    <text x="599" y="572">Mac mini · Ollama</text>
    <text x="953" y="572">RTX 3090 · vLLM</text>
    <text x="245" y="652">RTX 4090 · llama.cpp</text>
    <text x="599" y="652">RTX 5090 · ComfyUI</text>
    <text x="953" y="652">iPhone · on-device</text>
  </g>
  <text x="599" y="670" text-anchor="middle" fill="#ede9fe" font-size="11.5">media engine · image · video</text>
</svg>
